services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    restart: always
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --host 127.0.0.1 --port 9000 --user \"$${CLICKHOUSE_USER}\" --password \"$${CLICKHOUSE_PASSWORD}\" --query 'SELECT 1'",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"

  backend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_HTTP_PORT: 8123
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_GITHUB_REPOSITORY_URL: ${VITE_GITHUB_REPOSITORY_URL:-}
        VITE_GITHUB_RELEASES_URL: ${VITE_GITHUB_RELEASES_URL:-}
        VITE_GITHUB_ISSUES_URL: ${VITE_GITHUB_ISSUES_URL:-}
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  clickhouse_data:
